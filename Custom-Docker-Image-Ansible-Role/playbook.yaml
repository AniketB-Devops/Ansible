
- name: install docker and deploy app
  hosts: web
  become: true
  gather_facts: false
  vars:
    app_dir: /opt/fastapi-docker
    image_name: fastapi-app
    container_name: fastapi-container
    ansible_user: ubuntu

  pre_tasks:
    - name: update cache
      apt:
        update_cache: yes
    - name: install docker
      apt:
        name: docker.io
        state: present
    - name: ensure docker state is up and running
      service:
        name: docker
        state: started
        enabled: true
  tasks:
    - name: add current user into docker group
      user:
        name: "{{ansible_user}}"
        groups: docker
        append: yes
    - name: create app directory
      file:
        path: "{{app_dir}}"
        state: directory
        owner: "{{ansible_user}}"

    - name: copy fast api code
      copy:
        src: ./app/
        dest: "{{app_dir}}"
        owner: "{{ansible_user}}"
    
    - name: build docker file
      command: docker build -t {{image_name}} .
      args:
        chdir: "{{app_dir}}"
    
    - name: stop and remove any existing container_name
      shell: |
        docker rm -f {{container_name}} || true
    
    - name: run the container
      command: >
        docker run -d --name {{container_name}}
        -p 9000:8000 {{image_name}}
