- name: check apache install status
  command: systemctl status apache2
  register: apache_status

- name: print apache status
  debug: 
    msg: "{{ apache_status.stdout }}"

- name: update default page
  template: 
    src: index.html
    dest: /var/www/html
  register: copy_result

- name: check template copy result
  debug:
    var: copy_result
