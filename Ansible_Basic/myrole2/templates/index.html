<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Index Page</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
    }

    header {
      background: #4CAF50;
      color: white;
      padding: 1rem;
      text-align: center;
    }

    main {
      padding: 2rem;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: #222;
      color: #fff;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    button {
      padding: 0.6rem 1.2rem;
      border: none;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome!</h1>
    <p>This is a sample index.html page</p>
  </header>

  <main>
    <h2>Hello World 👋</h2>
    <p>
      This is a basic HTML template with inline CSS.
      You can customize it however you like.
    </p>

    <button onclick="sayHello()">Click Me</button>
  </main>

  <footer>
    <p>© 2026 Your Name</p>
  </footer>

  <script>
    function sayHello() {
      alert("Hello! Thanks for clicking 😊");
    }
  </script>

</body>
</html>
